[package]
authors     = { workspace = true }
categories  = ["development-tools"]
description = "Telemetry data models for brouter"
edition     = { workspace = true }
keywords    = ["llm", "telemetry", "usage"]
license     = { workspace = true }
name        = "brouter_telemetry_models"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
brouter_provider_models = { workspace = true }
serde                   = { workspace = true, features = ["derive", "std"] }
serde_json              = { workspace = true, features = ["std"] }

[features]
default          = []
fail-on-warnings = ["brouter_provider_models/fail-on-warnings"]
