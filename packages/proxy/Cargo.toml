[package]
authors     = { workspace = true }
categories  = ["proxy", "llm"]
description = "Lightweight proxy for forwarding LLM API requests with observability"
edition     = { workspace = true }
keywords    = ["proxy", "llm", "router", "forwarding"]
license     = { workspace = true }
name        = "brouter_proxy"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
anyhow = { workspace = true, features = ["std"] }
axum = { workspace = true, features = ["tokio", "http1", "http2"] }
clap = { workspace = true, features = ["derive", "help", "std", "usage"] }
http = { workspace = true }
reqwest = { workspace = true, features = ["rustls", "stream"] }
tokio = { workspace = true, features = ["full", "process", "signal"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = [
    "env-filter",
    "json",
    "fmt",
    "std",
] }
uuid = { workspace = true, features = ["v4"] }

[[bin]]
name = "brouter-proxy"
path = "src/main.rs"

[features]
default          = []
fail-on-warnings = []
