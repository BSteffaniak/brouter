[package]
authors     = { workspace = true }
categories  = ["config"]
description = "Configuration loading and validation for brouter"
edition     = { workspace = true }
keywords    = ["config", "llm", "router"]
license     = { workspace = true }
name        = "brouter_config"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
brouter_catalog              = { workspace = true }
brouter_catalog_models       = { workspace = true }
brouter_config_models        = { workspace = true }
brouter_introspection_models = { workspace = true }
brouter_provider_models      = { workspace = true }
brouter_router_models        = { workspace = true }
thiserror                    = { workspace = true }
toml                         = { workspace = true, features = ["parse"] }

[features]
default = []
fail-on-warnings = [
    "brouter_catalog/fail-on-warnings",
    "brouter_catalog_models/fail-on-warnings",
    "brouter_config_models/fail-on-warnings",
    "brouter_introspection_models/fail-on-warnings",
    "brouter_provider_models/fail-on-warnings",
    "brouter_router_models/fail-on-warnings",
]
