[package]
authors     = { workspace = true }
categories  = ["config"]
description = "Configuration loading and validation for brouter"
edition     = { workspace = true }
keywords    = ["config", "llm", "router"]
license     = { workspace = true }
name        = "brouter_config"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
brouter_config_models   = { workspace = true }
brouter_provider_models = { workspace = true }
thiserror               = { workspace = true }
toml                    = { workspace = true, features = ["parse"] }

[features]
default = []
fail-on-warnings = [
    "brouter_config_models/fail-on-warnings",
    "brouter_provider_models/fail-on-warnings",
]
