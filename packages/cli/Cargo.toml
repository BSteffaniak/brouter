[package]
authors     = { workspace = true }
categories  = ["command-line-utilities", "development-tools"]
description = "Command-line interface for brouter"
edition     = { workspace = true }
keywords    = ["cli", "llm", "router"]
license     = { workspace = true }
name        = "brouter_cli"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[lib]
name = "brouter_cli"
path = "src/lib.rs"

[[bin]]
name = "brouter"
path = "src/main.rs"

[dependencies]
anyhow = { workspace = true, features = ["std"] }
base64 = { workspace = true }
brouter_api_models = { workspace = true }
brouter_catalog_models = { workspace = true }
brouter_config = { workspace = true }
brouter_config_models = { workspace = true }
brouter_provider = { workspace = true }
brouter_provider_models = { workspace = true }
brouter_router = { workspace = true }
brouter_router_models = { workspace = true }
brouter_server = { workspace = true }
clap = { workspace = true, features = ["derive", "help", "std", "usage"] }
rand = { workspace = true }
reqwest = { workspace = true, features = ["json", "rustls"] }
serde = { workspace = true, features = ["derive"] }
serde_json = { workspace = true, features = ["std"] }
sha2 = { workspace = true }
sshenv_vault = { workspace = true }
tokio = { workspace = true, features = ["macros", "rt-multi-thread", "time"] }
tracing = { workspace = true }
tracing-subscriber = { workspace = true, features = [
    "ansi",
    "env-filter",
    "fmt",
    "json",
    "std",
] }
zeroize = { workspace = true }

[features]
default = []
fail-on-warnings = [
    "brouter_api_models/fail-on-warnings",
    "brouter_config/fail-on-warnings",
    "brouter_config_models/fail-on-warnings",
    "brouter_router/fail-on-warnings",
    "brouter_router_models/fail-on-warnings",
    "brouter_server/fail-on-warnings",
]
