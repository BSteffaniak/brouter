categories  = ["algorithms"]
description = "Prompt analysis and model routing engine for brouter"
edition     = { workspace = true }
keywords    = ["llm", "router", "routing"]
license     = { workspace = true }
name        = "brouter_router"
readme      = "README.md"
repository  = { workspace = true }
version     = { workspace = true }

[dependencies]
