brouter_catalog_models  = { workspace = true }
brouter_provider_models = { workspace = true }
brouter_router_models   = { workspace = true }
thiserror               = { workspace = true }

[features]
default = []
fail-on-warnings = [
    "brouter_api_models/fail-on-warnings",
    "brouter_catalog_models/fail-on-warnings",
    "brouter_provider_models/fail-on-warnings",
    "brouter_router_models/fail-on-warnings",
]
