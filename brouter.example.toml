[server]
host = "127.0.0.1"
port = 8080
# Optional local server auth. Requests must send Authorization: Bearer $BROUTER_API_KEY.
# api_key_env = "BROUTER_API_KEY"
max_request_body_bytes = 1048576
# cors_allowed_origins = ["http://localhost:3000"]

[router]
default_objective = "balanced"
# Optional named profile for brouter/auto. Requests can also use model = "profile:<name>",
# x-brouter-profile, or metadata.brouter_profile.
# default_profile = "conserve_openai"
debug_headers = true
provider_failure_threshold = 3
provider_cooldown_ms = 30000
# Optional budget guards based on router cost estimates.
# max_estimated_cost = 0.05
# max_session_estimated_cost = 1.00

[router.aliases]
fast = "fast_local"
strong = "strong_cloud"

[router.groups]
cloud = ["cheap_cloud", "strong_cloud"]

[router.context]
# Protect conversations from silently falling back to a smaller context window.
safety_margin_ratio = 0.15
preserve_session_context_floor = true
allow_context_downgrade = false

# Example quota-conservation profile: keep the same models available, but avoid
# the priority lane and prefer cheaper/free candidates while quota is low.
# [[router.profiles.conserve_openai.deny]]
# attributes = { latency_class = "priority" }
# reason = "priority lane disabled while quota is low"
# hard = true
#
# [[router.profiles.conserve_openai.deny]]
# providers = ["openai"]
# reason = "prefer free/local models before OpenAI"
# hard = false
# penalty = 25.0

[router.scoring]
quality_weight = 1.0
balanced_cost_weight = 20.0
cheapest_cost_weight = 100.0
local_bonus = 10.0
strongest_quality_weight = 0.5
first_message_reasoning_bonus = 8.0
code_bonus = 15.0
reasoning_bonus = 20.0
policy_penalty = 30.0

[[router.rules]]
name = "private-local"
when_contains = ["secret", "private key", "credentials"]
objective = "local_only"
require_capabilities = ["local"]

[[router.rules]]
name = "debug-code-reasoning"
intent = "debugging"
prefer_capabilities = ["reasoning"]

[[router.rules]]
name = "explicit-priority"
when_contains = ["priority", "urgent", "asap", "low latency", "quick response"]
prefer_attributes = { latency_class = "priority" }

[telemetry]
database_path = "brouter.db"

[providers.ollama]
kind = "open-ai-compatible"
base_url = "http://localhost:11434/v1"
timeout_ms = 60000

[providers.openai]
kind = "open-ai-compatible"
base_url = "https://api.openai.com/v1"
api_key_env = "OPENAI_API_KEY"
timeout_ms = 60000
# Optional provider-level per-request estimated cost budget.
# max_estimated_cost = 0.05

# ChatGPT/Codex Max subscription auth through a brouter-owned sshenv vault.
# Create credentials with browser OAuth: brouter auth openai-codex login --profile openai-max
# [providers.openai_max]
# kind = "openai-codex"
# auth_backend = "sshenv"
# auth_profile = "openai-max"
# auth_vault_path = "~/.local/state/brouter/auth/vault"
# timeout_ms = 60000
#
# Attribute mappings translate brouter's generic model attributes into
# provider-specific request fields only when the selected model has that
# attribute value.
# [providers.openai_max.attribute_mappings.latency_class.priority.request_fields]
# service_tier = "priority"
#
# [providers.openai_max.attribute_mappings.latency_class.standard]
# omit_request_fields = ["service_tier"]

[models.fast_local]
provider = "ollama"
model = "qwen2.5-coder:7b"
context_window = 32768
input_cost_per_million = 0.0
output_cost_per_million = 0.0
quality = 60
capabilities = ["chat", "code", "local"]

[models.cheap_cloud]
provider = "openai"
model = "gpt-4o-mini"
context_window = 128000
input_cost_per_million = 0.15
output_cost_per_million = 0.60
quality = 70
capabilities = ["chat", "json", "tools"]
attributes = { latency_class = "standard", billing_class = "api" }
display_badges = ["standard"]

[models.strong_cloud]
provider = "openai"
model = "gpt-4.1"
context_window = 128000
input_cost_per_million = 2.00
output_cost_per_million = 8.00
quality = 90
capabilities = ["chat", "code", "json", "tools", "reasoning"]
attributes = { latency_class = "priority", billing_class = "api" }
display_badges = ["priority"]
# Optional model-level per-request estimated cost budget.
# max_estimated_cost = 0.10

[models.embedding_cloud]
provider = "openai"
model = "text-embedding-3-small"
context_window = 8192
input_cost_per_million = 0.02
output_cost_per_million = 0.0
quality = 70
capabilities = ["embeddings"]
